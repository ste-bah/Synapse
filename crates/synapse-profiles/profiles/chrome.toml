id = "chrome"
label = "Google Chrome"
schema_version = 2
use_scope = "productivity"
mode = "hybrid"
mouse_curve_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "chrome.exe"
title_regex = ".* - Google Chrome$"

[[matches]]
exe = "msedge.exe"
title_regex = ".* - Microsoft Edge$"

[[matches]]
exe = "chromium.exe"

# Bare-exe fallbacks so the profile still binds on windows whose title lacks the
# " - Google Chrome"/" - Microsoft Edge" suffix (e.g. chrome://version, PWAs,
# the initial blank window). The title-specific matches above rank higher.
[[matches]]
exe = "chrome.exe"

[[matches]]
exe = "msedge.exe"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
address_bar = "ctrl+l"
back = "alt+left"
forward = "alt+right"
new_tab = "ctrl+t"
reload = "ctrl+r"
switch_tab_left = "ctrl+shift+tab"
switch_tab_right = "ctrl+tab"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_curated_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p1"
"registry.backlog_issue" = "#481"
"registry.quality_signal" = "profile_quality.chrome"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_clipboard,act_press,storage_inspect,profile_quality_refresh,browser_window_title_readback,browser_history_readback"
"registry.compatibility_target" = "chrome.windows"
"registry.compatibility_targets" = "chrome.windows,edge.windows,chromium.windows"
"registry.safe_default_backend_policy" = "auto; local productivity/browser navigation only; no credential/payment/account changes; no remote execution; audit export requires explicit consent"
"action.address_bar_key" = "ctrl+l"
"action.back_key" = "alt+left"
"action.forward_key" = "alt+right"
"action.new_tab_key" = "ctrl+t"
"action.reload_key" = "ctrl+r"
"action.switch_tab_left_key" = "ctrl+shift+tab"
"action.switch_tab_right_key" = "ctrl+tab"
"action.navigation_text_entry_verified_path" = "act_press ctrl+l + act_clipboard write + ctrl+v paste + enter + browser_window_title_readback"

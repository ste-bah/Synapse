"registry.hud_issue" = "#495"
"registry.level2_fsv_issue" = "#496"
"registry.policy_issue" = "#497"
"registry.audit_moat_issue" = "#498"
"registry.action_issue" = "#499"
"registry.full_tool_fsv_issue" = "#500"
"registry.gameplay_memory_issue" = "#501"
"registry.world_model_issue" = "#505"
"registry.map_window_issue" = "#509"
"registry.contextgraph_memory_issue" = "#529"
"registry.delta_reality_issue" = "#536"
"registry.reality_tools_issue" = "#538"
"registry.reality_everquest_issue" = "#541"
"registry.quality_signal" = "profile_quality.everquest.live"
"registry.minimum_manual_fsv" = "profile_list,observe,read_text,act_keymap,act_press,act_click,storage_inspect,replay_record,profile_registry_inspect,everquest_current_state,everquest_world_summary,reality_baseline,observe_delta,reality_audit,everquest_process_window_readback,everquest_log_readback,level_2_visible_readback"
"registry.compatibility_target" = "everquest.live"
"registry.safe_default_backend_policy" = "auto; operator-owned live character on Frostreaver only; foreground-only; no chat/economy/social/account/PvP/group/guild/raid/destructive-UI automation; no memory/protocol hooks; audit export requires explicit consent"
"audit.tags" = "game:everquest,server:frostreaver,goal:level2,moat:profile-audit"
"capability.observe.foreground" = "profile_list+observe foreground profile_id"
"capability.observe.hud" = "everquest.level_text, everquest.next_level_label, and everquest.next_level_percent from the visible Inventory character panel; everquest.map_window_text is a bounded top-left OCR crop for the saved EverQuest map UI title/search/labels layout; visible crop remains the SoT when numeric OCR is ambiguous"
"capability.world_model" = "everquest_current_state,route_plan,map_sensor,planner_guard,world_summary,world_model_record/inspect,trajectory/export,action_prior"
"capability.reality_delta" = "reality_baseline,observe_delta,reality_audit; baseline+deltas guide context, full audits repair drift before movement/combat"
"capability.contextgraph_memory" = "exported compact/redacted EverQuest episodes with provenance feed ContextGraph retrieval; Synapse storage remains gameplay SoT"
"capability.action.keyboard.software" = "act_keymap resolves reviewed profile aliases to foreground-only normal inputs; act_press remains available for explicit keys"
"capability.action.mouse" = "mouse_default=hardware; EverQuest software clicks fail closed after #503 because custom UI activation was not physically reliable"
"capability.audit.action_log" = "CF_ACTION_LOG via storage_inspect samples"

[[event_extensions]]
name = "everquest_level_observed"
from_filter = { op = "and", args = [
    { op = "source", source = "perception_hud" },
    { op = "kind", kind = "perception.hud_observed" },
    { op = "data", path = "/profile_id", predicate = { op = "eq", value = "everquest.live" } },
    { op = "data", path = "/hud/everquest.level_text", predicate = { op = "exists" } }
] }
emits_kind = "everquest.level_observed"

[[event_extensions]]
name = "everquest_action_observed"
from_filter = { op = "and", args = [
    { op = "source", source = "action_emitter" },
    { op = "kind", kind = "action.dispatched" },
    { op = "data", path = "/profile_id", predicate = { op = "eq", value = "everquest.live" } }
] }
emits_kind = "everquest.action_observed"

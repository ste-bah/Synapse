id = "everquest.live"
label = "EverQuest Live Evaluation"
schema_version = 2
use_scope = "operator_owned_test"
mode = "pixel_only"
mouse_curve_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "eqgame.exe"
title_regex = ".*EverQuest.*"

[[matches]]
exe = "eqgame.exe"

[capture]
target = "foreground_window"
min_update_interval_ms = 16
cursor_visible = true

[detection]
model_id = "game_ui_general_v0"
classes_of_interest = ["player", "npc", "target", "nameplate", "chat", "hotbar", "spellbar", "health", "mana", "xp"]
confidence_threshold = 0.45
max_detections = 48

[ocr]
default_backend = "winrt"

[[hud]]
name = "everquest.level_text"
extractor = { kind = "winrt_ocr" }
parser = { kind = "regex", pattern = "(?i)(?:^|\\s)([0-9]{1,3})\\s+Wi(?:zard)?\\b", group = 1 }
region = { kind = "anchored_to_edge", edge = "top_left", x_offset = 80, y_offset = 80, w = 320, h = 150 }
confidence_threshold = 0.65

[[hud]]
name = "everquest.next_level_label"
extractor = { kind = "winrt_ocr" }
parser = { kind = "regex", pattern = "(?i)(NEXT(?:\\s+LEVE[LV])?)", group = 1 }
region = { kind = "anchored_to_edge", edge = "top_left", x_offset = 80, y_offset = 180, w = 320, h = 260 }
confidence_threshold = 0.65

[[hud]]
name = "everquest.next_level_percent"
extractor = { kind = "winrt_ocr" }
parser = { kind = "regex", pattern = "(?i)NEXT(?:\\s+LEVE[LV])?\\s+([0-9]{1,3}(?:[\\.,][0-9]{1,3})?)\\s*%", group = 1 }
region = { kind = "anchored_to_edge", edge = "top_left", x_offset = 80, y_offset = 180, w = 320, h = 260 }
confidence_threshold = 0.65

[[hud]]
name = "everquest.zone_or_location_text"
extractor = { kind = "winrt_ocr" }
parser = { kind = "regex", pattern = "(?i)(neriak|frostreaver|everquest|wizard|dark elf)", group = 1 }
region = { kind = "fraction_of_window", x = 0.00, y = 0.00, w = 1.00, h = 1.00 }
confidence_threshold = 0.60

[[hud]]
name = "everquest.map_window_text"
extractor = { kind = "winrt_ocr" }
parser = { kind = "regex", pattern = "(?is)(map|search|find|labels?|height|auto[-\\s]?zoom|zone\\s+guide|base\\s+layer|layer\\s+[0-9]|neriak|nektulos|priest\\s+of\\s+discord|to[_\\s-]+nektulos[_\\s-]+forest|to[_\\s-]+neriak)", group = 1 }
region = { kind = "fraction_of_window", x = 0.00, y = 0.10, w = 0.22, h = 0.45 }
confidence_threshold = 0.40

[keymap]
forward = "w"
back = "s"
left = "a"
right = "d"
turn_left = "left"
turn_right = "right"
jump = "space"
target_nearest_npc = "f8"
target_self = "f1"
auto_attack = "q"
con = "c"
consider = "c"
sit = "x"
inventory = "i"
spellbook = "ctrl+b"
menu = "esc"
hotbar1 = "1"
hotbar2 = "2"
hotbar3 = "3"
hotbar4 = "4"
hotbar5 = "5"
hotbar6 = "6"
hotbar7 = "7"
hotbar8 = "8"
hotbar9 = "9"
hotbar10 = "0"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "hardware"
pad_default = "auto"

[metadata]
benchmark_id = "everquest.live.level2"
"runtime.everquest.install_path" = "C:\\Users\\Public\\Daybreak Game Company\\Installed Games\\EverQuest"
"runtime.everquest.exe" = "C:\\Users\\Public\\Daybreak Game Company\\Installed Games\\EverQuest\\eqgame.exe"
"runtime.everquest.server" = "Frostreaver"
"runtime.everquest.character_race" = "Dark Elf"
"runtime.everquest.character_class" = "Wizard"
"runtime.everquest.starting_level" = "1"
"runtime.everquest.starting_zone" = "Neriak"
"runtime.everquest.acceptance_goal" = "reach_level_2"
"supported_use.operator_attended_required" = "true"
"supported_use.operator_owned_character_required" = "true"

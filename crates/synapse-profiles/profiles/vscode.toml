id = "vscode"
label = "Visual Studio Code"
schema_version = 2
use_scope = "productivity"
mode = "hybrid"
mouse_curve_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "Code.exe"
title_regex = ".* - Visual Studio Code(?: \\[Administrator\\])?$"

[[matches]]
exe = "VSCodium.exe"
title_regex = ".* - VSCodium(?: \\[Administrator\\])?$"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
command_palette = "ctrl+shift+p"
copy = "ctrl+c"
find = "ctrl+f"
go_to_file = "ctrl+p"
paste = "ctrl+v"
quick_open = "ctrl+p"
save = "ctrl+s"
save_all = "ctrl+k"
terminal = "ctrl+`"
terminal_toggle = "ctrl+`"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_curated_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p1"
"registry.backlog_issue" = "#479"
"registry.quality_signal" = "profile_quality.vscode"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_press,act_type,storage_inspect,profile_quality_refresh,vscode_file_readback,vscode_command_palette_readback,vscode_integrated_terminal_readback"
"registry.compatibility_target" = "vscode.windows"
"registry.safe_default_backend_policy" = "auto; local productivity only; no remote execution; audit export requires explicit consent"
"action.terminal_toggle_key" = "ctrl+`"

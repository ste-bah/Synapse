id = "notepad"
label = "Notepad"
schema_version = 2
use_scope = "productivity"
mode = "a11y_only"
mouse_curve_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "notepad.exe"
title_regex = ".* - Notepad$"

[[matches]]
exe = "Notepad.exe"

[[matches]]
title_regex = "^Save As$"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
copy = "ctrl+c"
cut = "ctrl+x"
find = "ctrl+f"
new_file = "ctrl+n"
open = "ctrl+o"
paste = "ctrl+v"
save = "ctrl+s"
select_all = "ctrl+a"
undo = "ctrl+z"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_curated_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p1"
"registry.backlog_issue" = "#478"
"registry.quality_signal" = "profile_quality.notepad"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_type,storage_inspect,profile_quality_refresh,notepad_value_readback"
"registry.compatibility_target" = "notepad.windows"
"registry.safe_default_backend_policy" = "auto; local productivity only; no remote execution; audit export requires explicit consent"
"action.act_type_min_linear_ms_per_char" = "20"
"action.act_type_text_integrity" = "dispatch_only_requires_target_readback"

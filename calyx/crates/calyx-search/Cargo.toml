[package]
autotests = false
name = "calyx-search"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
name = "calyx_search"
path = "src/lib.rs"

[features]
default = []
# Search rebuild policy needs to verify the actual cuVS CAGRA build path. The
# resolved truth is still `calyx_sextant::CUVS_COMPILED`; this feature only
# forwards the intended GPU build surface to sextant for explicit FSV runs.
cuda = ["calyx-sextant/cuda"]

[dependencies]
calyx-core = { path = "../calyx-core" }
calyx-aster = { path = "../calyx-aster" }
calyx-ledger = { path = "../calyx-ledger" }
calyx-sextant = { path = "../calyx-sextant" }
calyx-registry = { path = "../calyx-registry" }
calyx-ward = { path = "../calyx-ward" }
serde = { workspace = true }
serde_json.workspace = true
sha2.workspace = true
rayon.workspace = true
bincode.workspace = true

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61.2", features = [
    "Win32_Foundation",
    "Win32_Storage_FileSystem",
] }

[dev-dependencies]
calyx-fsv = { path = "../calyx-fsv" }
ulid = { workspace = true }

# BEGIN generated integration harnesses (issue #1546)

[[test]]
name = "__calyx_integration_suite_0"
path = "tests/__calyx_integration_suite_0.rs"

# END generated integration harnesses (issue #1546)

[lints]
workspace = true

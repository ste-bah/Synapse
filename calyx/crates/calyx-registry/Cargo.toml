[package]
autotests = false
name = "calyx-registry"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
publish.workspace = true

[features]
default = []
cuda = ["candle-cuda", "calyx-forge/cuda"]
candle-cuda = ["candle-core/cuda", "candle-nn/cuda", "candle-transformers/cuda", "fastembed/cuda"]

[dependencies]
calyx-assay = { path = "../calyx-assay" }
calyx-aster = { path = "../calyx-aster" }
calyx-core = { path = "../calyx-core" }
calyx-forge = { path = "../calyx-forge" }
calyx-ledger = { path = "../calyx-ledger" }
blake3.workspace = true
candle-core = "0.10.2"
candle-nn = "0.10.2"
candle-transformers = "0.10.2"
fastembed = { version = "5.16.0", default-features = false, features = ["hf-hub-rustls-tls", "ort-load-dynamic", "qwen3"] }
hf-hub = { version = "0.5.0", default-features = false, features = ["ureq", "rustls-tls"] }
memmap2.workspace = true
ort = { version = "=2.0.0-rc.12", default-features = false, features = ["std", "load-dynamic", "cuda", "api-24"] }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
tokenizers = { version = "0.22.2", default-features = false, features = ["onig"] }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61.2", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_JobObjects",
    "Win32_System_LibraryLoader",
    "Win32_System_Threading",
] }

[dev-dependencies]
calyx-fsv = { path = "../calyx-fsv" }
calyx-loom = { path = "../calyx-loom" }
calyx-sextant = { path = "../calyx-sextant" }
proptest.workspace = true

# BEGIN generated integration harnesses (issue #1546)

